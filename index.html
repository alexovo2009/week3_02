<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園吐槽牆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .fab-shadow {
            box-shadow: 0 20px 40px -10px rgba(234, 88, 12, 0.3);
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 640px) {
            .masonry-grid {
                column-count: 2;
            }
        }
        @media (min-width: 1024px) {
            .masonry-grid {
                column-count: 3;
            }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ea580c',
                        secondary: '#f97316',
                        'text-main': '#1e293b',
                        'text-sub': '#64748b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-text-main min-h-screen">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3">
        <div class="max-w-7xl mx-auto space-y-4">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <h1 class="text-2xl font-black tracking-tight text-primary flex items-center gap-2">
                        <span>💬</span>
                        <span class="hidden sm:block">校園吐槽牆</span>
                    </h1>
                </div>

                <div class="flex-1 max-w-md relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-text-sub w-4 h-4"></i>
                    <input
                    type="text"
                    id="searchInput"
                    placeholder="搜尋吐槽內容..."
                    class="w-full pl-10 pr-4 bg-gray-100/50 border-none rounded-full h-10 focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm"
                    >
                </div>

                <div class="flex items-center gap-2">
                    <button onclick="handleAISummary()" id="aiBtn" class="flex items-center gap-2 bg-zinc-800 text-zinc-100 px-4 py-2 rounded-full font-medium hover:bg-zinc-700 transition-colors active:scale-95 border border-zinc-700 disabled:opacity-50">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        <span id="aiBtnText">AI 摘要</span>
                    </button>
                    <button onclick="openModal()" class="flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-full font-bold hover:bg-orange-600 transition-colors active:scale-95">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                        <span>我要吐槽</span>
                    </button>
                </div>
            </div>

            <div class="pt-1">
                <div id="categoryContainer" class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-1 -mx-4 px-4">
                    <!-- Categories will be rendered here -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-8">

            <!-- Left Content -->
            <div class="space-y-8">
                <!-- Status Tab Switcher -->
                <div class="flex justify-start">
                    <div class="bg-white p-1 rounded-full border border-gray-100 shadow-sm flex gap-1">
                        <button id="tabAll" onclick="setFilter('全部')" class="px-6 py-2 rounded-full font-bold text-sm transition-all bg-primary text-white">📋 全部</button>
                        <button id="tabActive" onclick="setFilter('active')" class="px-6 py-2 rounded-full font-bold text-sm transition-all text-text-sub hover:bg-gray-50">⚡ Active</button>
                        <button id="tabDone" onclick="setFilter('done')" class="px-6 py-2 rounded-full font-bold text-sm transition-all text-text-sub hover:bg-gray-50">✅ Done</button>
                    </div>
                </div>

                <!-- List Container -->
                <div id="listContainer" class="masonry-grid">
                    <!-- Cards will be injected here -->
                </div>

                <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-text-sub space-y-4">
                    <i data-lucide="message-circle-off" class="w-12 h-12 opacity-20"></i>
                    <p class="font-bold">還沒有吐槽，快來寫下第一條！</p>
                </div>
            </div>

            <!-- Right Sidebar -->
            <aside class="space-y-8">
                <!-- Stats -->
                <div class="bg-white rounded-[32px] p-6 border border-gray-100 shadow-xl shadow-primary/5 space-y-6 relative overflow-hidden group">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl"></div>
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-gradient-to-br from-primary to-orange-400 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
                            <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <h3 class="font-black text-lg text-text-main leading-none">吐槽數據</h3>
                            <p class="text-[11px] text-text-sub font-bold uppercase tracking-wider mt-1">校園心聲</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3" id="userStatsGrid">
                        <!-- 統計卡片 -->
                    </div>
                </div>

                <!-- Leaderboard -->
                <div class="bg-white rounded-[32px] p-6 border border-gray-100 shadow-sm space-y-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-yellow-400 text-white rounded-xl flex items-center justify-center shadow-lg">
                            <i data-lucide="flame" class="w-5 h-5"></i>
                        </div>
                        <h3 class="font-black">最多讚嘅吐槽 (Top 6)</h3>
                    </div>
                    <div id="leaderboardList" class="space-y-3">
                        <!-- Leaderboard items -->
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="reviewModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-[40px] shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 p-2 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 transition-colors z-10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <div class="p-8">
                <div class="mb-8">
                    <h2 class="text-3xl font-black tracking-tight flex items-center gap-3">
                        <span class="text-4xl">💬</span> 我要吐槽
                    </h2>
                    <p class="text-text-sub font-bold mt-2 uppercase tracking-widest text-xs">發洩校園生活嘅不滿</p>
                </div>

                <form id="reviewForm" onsubmit="handleFormSubmit(event)" class="space-y-8">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-text-sub uppercase tracking-wider block ml-1">吐槽分類</label>
                        <div class="flex flex-wrap gap-2" id="categoryRadioGroup">
                            <div class="inline-block">
                                <input type="radio" name="category" value="食堂" id="cat-1" class="hidden peer" required>
                                <label for="cat-1" class="px-6 py-2.5 rounded-full bg-white border-2 border-slate-100 text-sm font-black text-slate-400 cursor-pointer transition-all peer-checked:bg-[#FF7D29] peer-checked:text-white peer-checked:border-[#FF7D29] hover:bg-slate-50">食堂</label>
                            </div>
                            <div class="inline-block">
                                <input type="radio" name="category" value="宿舍" id="cat-2" class="hidden peer" required>
                                <label for="cat-2" class="px-6 py-2.5 rounded-full bg-white border-2 border-slate-100 text-sm font-black text-slate-400 cursor-pointer transition-all peer-checked:bg-[#FFBF00] peer-checked:text-white peer-checked:border-[#FFBF00] hover:bg-slate-50">宿舍</label>
                            </div>
                            <div class="inline-block">
                                <input type="radio" name="category" value="課業" id="cat-3" class="hidden peer" required>
                                <label for="cat-3" class="px-6 py-2.5 rounded-full bg-white border-2 border-slate-100 text-sm font-black text-slate-400 cursor-pointer transition-all peer-checked:bg-[#3ABEF9] peer-checked:text-white peer-checked:border-[#3ABEF9] hover:bg-slate-50">課業</label>
                            </div>
                            <div class="inline-block">
                                <input type="radio" name="category" value="其他" id="cat-4" class="hidden peer" required>
                                <label for="cat-4" class="px-6 py-2.5 rounded-full bg-white border-2 border-slate-100 text-sm font-black text-slate-400 cursor-pointer transition-all peer-checked:bg-[#FD5D5D] peer-checked:text-white peer-checked:border-[#FD5D5D] hover:bg-slate-50">其他</label>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-black text-text-sub uppercase tracking-wider block ml-1">吐槽內容</label>
                        <textarea name="content" required placeholder="一口氣講晒你嘅不滿..." rows="4" class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-primary/20 outline-none transition-all font-medium resize-none"></textarea>
                    </div>

                    <button type="submit" class="w-full py-5 bg-primary text-white rounded-3xl font-black text-xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                        🚀 發佈吐槽
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ========== Google Sheet 同步設定 ==========
        // ⚠️ 請換成你真實嘅 Apps Script 部署網址
        const APPS_SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

        // ========== 欄位正規化（兼容 Sheet 大階 header） ==========
        function normalizeRecord(record) {
            return {
                id: record.id || record.ID || "",
                createdAt: record.createdAt || record.CreatedAt || "",
                content: record.content || record.Content || "",
                category: record.category || record.Category || "其他",
                likes: Number(record.likes !== undefined ? record.likes : (record.Likes || 0)),
                status: record.status || record.Status || "active"
            };
        }

        // ========== 將 record 轉成兼容 Sheet 大小階嘅格式 ==========
        function makeRecordSheetCompatible(record) {
            const compat = { ...record };
            if (compat.id) compat.ID = compat.id;
            if (compat.createdAt) compat.CreatedAt = compat.createdAt;
            if (compat.content) compat.Content = compat.content;
            if (compat.category) compat.Category = compat.category;
            if (compat.likes !== undefined) compat.Likes = compat.likes;
            if (compat.status) compat.Status = compat.status;
            return compat;
        }

        // ========== 從 Sheet 讀取 (只用 GET) ==========
        async function fetchRecordsFromSheet() {
            if (APPS_SCRIPT_URL.includes("PASTE")) return null;
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                const data = await res.json();
                return Array.isArray(data.records) ? data.records.map(normalizeRecord) : null;
            } catch (e) {
                console.warn("從 Sheet 讀取失敗", e);
                return null;
            }
        }

        // ========== 核心資料載入 (Sheet 優先，localStorage 備用) ==========
        async function loadData() {
            const remote = await fetchRecordsFromSheet();
            if (remote) {
                localStorage.setItem("records", JSON.stringify(remote));
                return remote;
            }
            const data = localStorage.getItem("records");
            return data ? JSON.parse(data) : [];
        }

        // ========== 同步至 Sheet（POST） ==========
        function syncToSheet(payload) {
            if (APPS_SCRIPT_URL.includes("PASTE")) return;
            // 如果有 record，轉換大小階確保後端認得
            if (payload.record) {
                payload.record = makeRecordSheetCompatible(payload.record);
            }
            try {
                fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                }).catch(err => console.warn("同步 Google Sheet 失敗", err));
            } catch (e) {
                console.warn("同步時發生錯誤", e);
            }
        }

        // ========== 狀態管理 ==========
        let currentStatusFilter = '全部';
        let currentCategory = '全部';
        let searchQuery = '';
        let userLikes = JSON.parse(localStorage.getItem('likes') || '[]');

        const categories = ['全部', '食堂', '宿舍', '課業', '其他'];

        // ========== 渲染卡片 ==========
        function createCard(review) {
            const div = document.createElement('div');
            div.className = 'masonry-item group bg-white rounded-[40px] border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-500 overflow-hidden relative active:scale-[0.98]';

            const isLiked = userLikes.includes(review.id);
            const isDone = review.status === 'done';

            div.innerHTML = `
                <div class="p-6 space-y-4">
                    <div class="flex items-start justify-between">
                        <span class="px-3 py-1 bg-primary/10 text-primary text-[10px] font-black rounded-full uppercase tracking-widest">${review.category}</span>
                        <span class="text-[10px] text-text-sub">${new Date(review.createdAt).toLocaleDateString()}</span>
                    </div>
                    <p class="text-sm text-slate-600 leading-relaxed font-medium">${review.content}</p>
                    <div class="flex items-center justify-between pt-4 border-t border-gray-50">
                        <button onclick="handleLike('${review.id}')" class="flex items-center gap-1.5 text-xs font-black transition-colors ${isLiked ? 'text-rose-500' : 'text-slate-400 hover:text-rose-400'}">
                            <i data-lucide="heart" class="w-4 h-4 ${isLiked ? 'fill-current' : ''}"></i>
                            <span>${review.likes}</span>
                        </button>
                        <div class="flex items-center gap-2">
                            <button onclick="deleteRecord('${review.id}')" class="p-2 text-slate-300 hover:text-red-400 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="toggleStatus('${review.id}')" class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-black transition-all ${isDone ? 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100' : 'bg-gray-50 text-slate-400 hover:bg-gray-100'}">
                                <i data-lucide="${isDone ? 'check-circle-2' : 'circle'}" class="w-4 h-4"></i>
                                <span>${isDone ? '已處理' : '未處理'}</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        // ========== 渲染列表 (支援 recordsOverride 避免覆蓋) ==========
        async function renderList(recordsOverride) {
            const records = recordsOverride || await loadData();
            const listContainer = document.getElementById('listContainer');
            const emptyState = document.getElementById('emptyState');

            const filtered = records.filter(r => {
                const matchesSearch = r.content.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesCategory = currentCategory === '全部' || r.category === currentCategory;
                const matchesStatus = currentStatusFilter === '全部' || r.status === currentStatusFilter;
                return matchesSearch && matchesCategory && matchesStatus;
            });

            listContainer.innerHTML = '';
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach(r => listContainer.appendChild(createCard(r)));
            }

            lucide.createIcons();
            renderCategories();
            renderStatsCount();
            renderLeaderboard();
        }

        // ========== 分類按鈕渲染 ==========
        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                const active = currentCategory === cat;
                btn.className = `px-5 py-2 rounded-full whitespace-nowrap font-bold text-sm transition-all border border-transparent shadow-sm ${active ? 'bg-primary text-white' : 'bg-white text-text-main border-gray-100 hover:bg-gray-50'}`;
                btn.textContent = cat;
                btn.onclick = () => selectCategory(cat);
                container.appendChild(btn);
            });
        }

        function selectCategory(cat) {
            currentCategory = cat;
            renderList();
        }

        // ========== 狀態篩選 ==========
        function setFilter(status) {
            currentStatusFilter = status;
            document.getElementById('tabAll').className = `px-6 py-2 rounded-full font-bold text-sm transition-all ${status === '全部' ? 'bg-primary text-white' : 'text-text-sub hover:bg-gray-50'}`;
            document.getElementById('tabActive').className = `px-6 py-2 rounded-full font-bold text-sm transition-all ${status === 'active' ? 'bg-primary text-white' : 'text-text-sub hover:bg-gray-50'}`;
            document.getElementById('tabDone').className = `px-6 py-2 rounded-full font-bold text-sm transition-all ${status === 'done' ? 'bg-primary text-white' : 'text-text-sub hover:bg-gray-50'}`;
            renderList();
        }

        // ========== 統計與排行榜 ==========
        function renderStatsCount() {
            const records = JSON.parse(localStorage.getItem('records') || '[]');
            const total = records.length;
            const activeCount = records.filter(r => r.status === 'active').length;
            const doneCount = records.filter(r => r.status === 'done').length;
            const statGrid = document.getElementById('userStatsGrid');
            if (statGrid) {
                statGrid.innerHTML = `
                    <div class="bg-slate-50/50 rounded-2xl p-4 border border-slate-100">
                        <p class="text-[10px] font-black text-slate-600 mb-1 uppercase tracking-widest">總吐槽</p>
                        <span class="text-3xl font-black text-slate-600">${total}</span>
                    </div>
                    <div class="bg-rose-50/50 rounded-2xl p-4 border border-rose-100">
                        <p class="text-[10px] font-black text-rose-600 mb-1 uppercase tracking-widest">讚數</p>
                        <span class="text-3xl font-black text-rose-600">${userLikes.length}</span>
                    </div>
                `;
            }
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboardList');
            const records = JSON.parse(localStorage.getItem('records') || '[]');
            const sorted = [...records].sort((a, b) => (b.likes || 0) - (a.likes || 0)).slice(0, 6);
            container.innerHTML = '';
            sorted.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-3 bg-slate-50 rounded-2xl border border-gray-100";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-primary text-white flex items-center justify-center text-sm font-black">${i + 1}</div>
                        <p class="font-black text-sm truncate w-40">${item.content}</p>
                    </div>
                    <div class="bg-primary/10 text-primary px-3 py-1 rounded-lg font-mono font-bold text-xs flex items-center gap-1">
                        <i data-lucide="heart" class="w-3 h-3 fill-current"></i>
                        <span>${item.likes}</span>
                    </div>
                `;
                container.appendChild(div);
            });
            if (sorted.length === 0) container.innerHTML = '<p class="text-center text-xs text-text-sub italic">未有數據</p>';
            lucide.createIcons();
        }

        // ========== 互動邏輯（修正：傳送完整 record 而唔係 changes） ==========
        async function handleLike(id) {
            const records = await loadData();
            const index = records.findIndex(r => r.id === id);
            if (index === -1) return;

            const review = records[index];
            if (userLikes.includes(id)) {
                userLikes = userLikes.filter(l => l !== id);
                review.likes = Math.max((review.likes || 1) - 1, 0);
            } else {
                userLikes.push(id);
                review.likes = (review.likes || 0) + 1;
            }
            localStorage.setItem('likes', JSON.stringify(userLikes));
            localStorage.setItem('records', JSON.stringify(records));
            // 傳送完整 record 物件（唔係 changes）
            syncToSheet({ action: "update", id: id, record: review });
            await renderList(records);
        }

        async function toggleStatus(id) {
            const records = await loadData();
            const r = records.find(item => item.id === id);
            if (r) {
                r.status = r.status === 'done' ? 'active' : 'done';
                localStorage.setItem('records', JSON.stringify(records));
                // 傳送完整 record 物件
                syncToSheet({ action: "update", id: id, record: r });
                await renderList(records);
            }
        }

        async function deleteRecord(id) {
            let records = await loadData();
            records = records.filter(r => r.id !== id);
            localStorage.setItem('records', JSON.stringify(records));
            syncToSheet({ action: "delete", id: id });
            await renderList(records);
        }

        function openModal() {
            document.getElementById('reviewModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('reviewModal').classList.add('hidden');
        }

        // ========== 提交吐槽 ==========
        async function saveData(newRecord) {
            const records = await loadData();
            records.push(newRecord);
            localStorage.setItem('records', JSON.stringify(records));
            syncToSheet({ action: "create", record: newRecord });
            await renderList(records);
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newRecord = {
                id: Date.now() + "_" + Math.random().toString(36).slice(2, 6),
                createdAt: new Date().toISOString(),
                content: formData.get('content'),
                category: formData.get('category'),
                likes: 0,
                status: 'active'
            };
            saveData(newRecord);
            e.target.reset();
            closeModal();
        }

        // ========== AI 摘要 ==========
        async function askAI(userPrompt) {
            const res = await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "askAI", prompt: userPrompt })
            });
            const data = await res.json();
            return data.result || data.error || "AI 冇回應";
        }

        async function handleAISummary() {
            const btn = document.getElementById('aiBtn');
            const text = document.getElementById('aiBtnText');
            btn.disabled = true;
            text.textContent = '思考中...';
            try {
                const records = await loadData();
                if (records.length === 0) { alert('未有吐槽資料可以摘要'); return; }
                const summaryInput = records.slice(0, 30).map(r =>
                    `[${r.category}] ${r.content}`
                ).join('\n');
                const prompt = '以下是班級吐槽牆嘅留言。請用繁體中文，用 3-5 句概括同學最關心嘅問題、情緒同有冇明顯 patterns:\n\n' + summaryInput;
                const result = await askAI(prompt);
                alert(result);
            } catch (e) {
                alert('AI 出錯：' + e.message);
            } finally {
                btn.disabled = false;
                text.textContent = 'AI 摘要';
            }
        }

        // ========== 搜尋 ==========
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderList();
        });

        // ========== 啟動 ==========
        window.onload = async () => {
            await renderList();
            lucide.createIcons();
        };
    </script>
</body>
</html>
